description: "IntakeAgent — alertmanager PrometheusRule false positive (missing topic filter)"
prompt: intake_classify
vars:
  payload: |
    {
      "source": "alertmanager",
      "external_id": "alert-ff3a9c",
      "alertname": "KafkaConsumerGroupLag",
      "status": "firing",
      "severity": "warning",
      "cluster": "kafkahub-preprod",
      "namespace": "kafka",
      "message": "Consumer group __consumer_offsets has lag > 1000",
      "labels": {
        "alertname": "KafkaConsumerGroupLag",
        "severity": "warning",
        "cluster": "kafkahub-preprod"
      }
    }
assert:
  - type: javascript
    value: |
      const r = JSON.parse(output);
      return r.rejected === false
        && r.env === "PREPROD"
        && r.pattern === "prom-rule-false-positive"
        && typeof r.subject === "string"
        && r.subject.length <= 30;
    threshold: 1.0
