description: "IntakeAgent — non-Kafka Jira ticket should be rejected"
prompt: intake_classify
vars:
  payload: |
    {
      "source": "jira",
      "external_id": "PKH-4400",
      "title": "[INCIDENT] Elasticsearch cluster degraded — shard allocation failure",
      "description": "Primary shards of index catalog-search-v3 are unassigned. Cluster health is RED.",
      "project": "PKH",
      "assignee": "arabaaoui",
      "status": "Open",
      "priority": "High",
      "labels": ["elasticsearch", "search", "infra"]
    }
assert:
  - type: javascript
    value: |
      const r = JSON.parse(output);
      return r.rejected === true
        && typeof r.reject_reason === "string"
        && r.reject_reason.length > 5;
    threshold: 1.0
