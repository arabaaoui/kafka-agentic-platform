[alembic]
# Path to migration scripts
script_location = migrations

# Synchronous DB URL — used by Alembic CLI only (not the async runtime)
# Override with --url or set DATABASE_URL_SYNC env var
sqlalchemy.url = postgresql://platform:platform@localhost:5433/platform

[post_write_hooks]
# ruff format on generated migration files
hooks = ruff_format
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format %%(output)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
