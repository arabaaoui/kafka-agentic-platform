# Tenant configuration — ENTERPRISE LAB (Self-Contained)
# Purely for Lab Stack exploration.

tenant: enterprise
display_name: "Enterprise Lab — Kafka Platform"

# Default autonomy level (L2 = read-only for now)
autonomy_level: L2

jira_projects: [LAB]

envs:
  lab:
    display_name: "LAB — LOCAL"
    badge_color: "blue"
    clusters: [enterprise-lab]
    kubeconfig: "/app/kube_conf/kubeconfig.yaml"
    kafka_namespace: kafka
    prom_url: "http://enterprise-k8s-lab:30090"
    vm_url: "http://enterprise-k8s-lab:30090"

  dev:
    display_name: "GKE — DEV"
    badge_color: "green"
    clusters: [gke-dev-cluster-kafka-hub]
    kubeconfig: "" # Will be patched dynamically
    kube_context: "gke-dev-cluster-kafka-hub"
    kafka_namespace: "kafka-dev"
    target_gsa_email: "dev-sa@enterprise-dev.iam.gserviceaccount.com"
    prom_url: "https://prometheus-dev.enterprise.internal"
    alertmanager_url: "https://alertmanager-dev.enterprise.internal"
    proxy_url: "http://proxy.enterprise.internal:8080"
    proxy_user: "ops-user"
    proxy_pass: "dummy-password"
